<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>DWL 3.0 Web Form</title>
  <link rel="stylesheet" href="style.css?v=1.7"/>
</head>
<body>
  <div class="toolbar">
    <button id="resetTop" type="button">Reset</button>
    <button id="uploadCrew" type="button">Upload Crew</button>
    <button id="loadCrew" type="button">Load Last Crew</button>
    <button id="printPdf" type="button">Print / Save PDF</button>
    <span style="margin-left:auto; font-size:12px; opacity:0.7;">DWL 3.0 (web overlay)</span>
  </div>

  <div class="canvas">
    <div id="page" class="page">
      <img id="bg" src="dwl_page1.png" alt="DWL background"/>
      <!-- fields injected by app.js -->
    </div>
  </div>

  <div class="bottom-actions">
    <button id="addPageBtn" type="button">Add Additional Page</button>
  </div>



  <!-- Crew paste modal -->
  <div id="crewModal" class="crew-modal" aria-hidden="true">
    <div class="crew-modal-box">
      <div class="crew-modal-title">Upload Crew</div>
      <div class="crew-modal-help">Paste one employee name per line. If you paste more than 20 names, add an additional page then load the crew again.</div>
      <textarea id="crewPaste" class="crew-textarea" rows="10" placeholder="One name per line"></textarea>
      <div class="crew-modal-actions">
        <button id="crewApply" type="button">Apply</button>
        <button id="crewCancel" type="button">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Used for consistent one-page PDF output across phone/desktop -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/3.0.3/jspdf.umd.min.js"></script>
  <script src="app.js?v=1.7"></script>
</body>
</html>
